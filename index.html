<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEMO — 任务系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Barlow+Condensed:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #030508;
        --bg-2: #080d12;
        --bg-3: #0e1520;
        --border: rgba(0, 240, 180, 0.1);
        --border-mid: rgba(0, 240, 180, 0.22);
        --border-hi: rgba(0, 240, 180, 0.45);
        --text: #c4ddd6;
        --text-dim: #3e6059;
        --text-faint: #1c352e;
        --accent: #00f0b4;
        --accent-dim: rgba(0, 240, 180, 0.12);
        --accent-glow:
          0 0 12px rgba(0, 240, 180, 0.35), 0 0 30px rgba(0, 240, 180, 0.12);
        --done-bg: #060e0a;
        --done-text: #1e4035;
        --done-strike: rgba(0, 240, 180, 0.5);
        --danger: #ff5555;
        --danger-dim: rgba(255, 85, 85, 0.12);
      }

      html,
      body {
        height: 100%;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Scanlines */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0, 240, 180, 0.018) 3px,
          rgba(0, 240, 180, 0.018) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }

      /* Dot grid */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(0, 240, 180, 0.06) 1px,
          transparent 1px
        );
        background-size: 32px 32px;
        pointer-events: none;
        z-index: 0;
      }

      /* ─── Boot overlay ─────────────────────────────────────── */
      .boot-overlay {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1.5rem;
        animation: bootFade 0.4s ease 1.6s both;
      }

      @keyframes bootFade {
        to {
          opacity: 0;
          pointer-events: none;
        }
      }

      .boot-text {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 0.75rem;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0;
        animation: bootTextIn 0.3s ease 0.1s both;
      }

      @keyframes bootTextIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 0.7;
          transform: translateY(0);
        }
      }

      .boot-logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 6rem;
        letter-spacing: 0.08em;
        color: var(--text);
        opacity: 0;
        animation: bootLogoIn 0.5s cubic-bezier(0.2, 0, 0, 1) 0.3s both;
      }

      .boot-logo em {
        color: var(--accent);
        font-style: normal;
        text-shadow: var(--accent-glow);
      }

      @keyframes bootLogoIn {
        from {
          opacity: 0;
          transform: scale(0.95) translateY(8px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .boot-bar-wrap {
        width: 280px;
        height: 2px;
        background: var(--border);
        opacity: 0;
        animation: bootTextIn 0.1s ease 0.7s both;
      }

      .boot-bar {
        height: 100%;
        background: var(--accent);
        box-shadow: var(--accent-glow);
        width: 0;
        animation: bootBar 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.75s both;
      }

      @keyframes bootBar {
        to {
          width: 100%;
        }
      }

      /* ─── Layout ───────────────────────────────────────────── */
      .app {
        position: relative;
        z-index: 1;
        max-width: 780px;
        margin: 0 auto;
        padding: 2.5rem 2rem 3rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        opacity: 0;
        animation: appIn 0.5s ease 1.8s both;
      }

      @keyframes appIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ─── Header ───────────────────────────────────────────── */
      .header {
        margin-bottom: 3rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
      }

      .header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.8rem;
      }

      .sys-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.6;
      }

      .sys-status {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .blink-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
        animation: blink 2.4s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }

      .main-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(5rem, 12vw, 9.5rem);
        letter-spacing: 0.04em;
        line-height: 0.88;
        color: var(--text);
        position: relative;
        user-select: none;
      }

      .main-title .accent-char {
        color: var(--accent);
        text-shadow: var(--accent-glow);
      }

      .header-meta {
        margin-top: 1rem;
        display: flex;
        gap: 2.5rem;
        flex-wrap: wrap;
      }

      .meta-chip {
        font-size: 0.68rem;
        color: var(--text-dim);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .meta-chip b {
        color: var(--text);
        font-weight: 500;
      }

      /* ─── Input ────────────────────────────────────────────── */
      .input-label {
        display: block;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 0.6rem;
      }

      .input-row {
        display: flex;
        border: 1px solid var(--border-mid);
        background: var(--bg-2);
        margin-bottom: 1.25rem;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .input-row:focus-within {
        border-color: var(--border-hi);
        box-shadow: var(--accent-glow);
      }

      .input-prompt {
        padding: 0.9rem 0.75rem 0.9rem 1.1rem;
        color: var(--accent);
        font-size: 1.05rem;
        font-weight: 700;
        user-select: none;
        line-height: 1;
        display: flex;
        align-items: center;
      }

      .todo-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.88rem;
        padding: 0.9rem 0;
        caret-color: var(--accent);
      }

      .todo-input::placeholder {
        color: var(--text-dim);
        opacity: 0.45;
      }

      .add-btn {
        background: var(--accent);
        border: none;
        color: var(--bg);
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.05rem;
        letter-spacing: 0.15em;
        padding: 0 1.6rem;
        cursor: pointer;
        transition:
          background 0.15s,
          box-shadow 0.15s;
        position: relative;
        overflow: hidden;
        min-width: 80px;
      }

      .add-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: white;
        opacity: 0;
        transition: opacity 0.1s;
      }

      .add-btn:hover {
        box-shadow: var(--accent-glow);
      }

      .add-btn:active::after {
        opacity: 0.15;
      }

      /* ─── Filters ──────────────────────────────────────────── */
      .filters {
        display: flex;
        border: 1px solid var(--border);
        margin-bottom: 1.5rem;
        overflow: hidden;
      }

      .f-btn {
        flex: 1;
        background: transparent;
        border: none;
        border-right: 1px solid var(--border);
        color: var(--text-dim);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        padding: 0.55rem 0.5rem;
        cursor: pointer;
        transition: all 0.15s;
      }

      .f-btn:last-child {
        border-right: none;
      }

      .f-btn:hover {
        background: var(--accent-dim);
        color: var(--accent);
      }

      .f-btn.active {
        background: var(--accent-dim);
        color: var(--accent);
        position: relative;
      }

      .f-btn.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
        box-shadow: var(--accent-glow);
      }

      /* ─── Task List ────────────────────────────────────────── */
      .task-list {
        flex: 1;
        list-style: none;
      }

      /* Task entry animation */
      @keyframes taskSlideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes taskSlideOut {
        to {
          opacity: 0;
          transform: translateX(20px);
          max-height: 0;
          padding-top: 0;
          padding-bottom: 0;
          margin-bottom: 0;
          border-width: 0;
          overflow: hidden;
        }
      }

      .task-item {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        padding: 0.85rem 1.1rem;
        border: 1px solid var(--border);
        margin-bottom: -1px;
        background: var(--bg-2);
        position: relative;
        transition: background 0.15s;
        animation: taskSlideIn 0.28s cubic-bezier(0.2, 0, 0, 1) both;
        max-height: 100px;
        overflow: hidden;
      }

      .task-item:first-child {
        border-radius: 2px 2px 0 0;
      }
      .task-item:last-child {
        border-radius: 0 0 2px 2px;
        margin-bottom: 0;
      }

      .task-item:hover {
        background: var(--bg-3);
        z-index: 1;
        border-color: var(--border-mid);
      }

      .task-item.done {
        background: var(--done-bg);
      }

      .task-item.removing {
        animation: taskSlideOut 0.22s cubic-bezier(0.4, 0, 1, 1) both;
      }

      .task-num {
        font-size: 0.6rem;
        color: var(--text-faint);
        width: 1.8rem;
        flex-shrink: 0;
        font-weight: 300;
        user-select: none;
      }

      .task-item.done .task-num {
        color: var(--text-faint);
      }

      /* Custom checkbox */
      .task-check {
        width: 17px;
        height: 17px;
        border: 1px solid var(--border-mid);
        flex-shrink: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        position: relative;
      }

      .task-check:hover {
        border-color: var(--accent);
        box-shadow: 0 0 8px rgba(0, 240, 180, 0.25);
      }

      .task-item.done .task-check {
        background: var(--accent);
        border-color: var(--accent);
        box-shadow: 0 0 10px rgba(0, 240, 180, 0.4);
      }

      .check-mark {
        opacity: 0;
        transform: scale(0.5) rotate(-10deg);
        transition: all 0.15s cubic-bezier(0.2, 0, 0, 1.5);
        font-size: 0.65rem;
        color: var(--bg);
        font-weight: 700;
        line-height: 1;
        pointer-events: none;
      }

      .task-item.done .check-mark {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }

      .task-text {
        flex: 1;
        font-size: 0.87rem;
        font-weight: 400;
        line-height: 1.45;
        color: var(--text);
        word-break: break-word;
        transition: color 0.3s;
      }

      .task-item.done .task-text {
        color: var(--done-text);
        text-decoration: line-through;
        text-decoration-color: var(--done-strike);
        text-decoration-thickness: 1px;
      }

      .task-del {
        flex-shrink: 0;
        width: 26px;
        height: 26px;
        background: transparent;
        border: 1px solid transparent;
        color: var(--text-dim);
        font-family: "JetBrains Mono", monospace;
        font-size: 1rem;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 0;
        transition: all 0.15s;
      }

      .task-item:hover .task-del {
        opacity: 1;
      }

      .task-del:hover {
        color: var(--danger);
        border-color: rgba(255, 85, 85, 0.3);
        background: var(--danger-dim);
      }

      /* ─── Empty State ──────────────────────────────────────── */
      .empty {
        padding: 5rem 0;
        text-align: center;
      }

      .empty-icon {
        font-family: "JetBrains Mono", monospace;
        font-size: 1.8rem;
        color: var(--text-faint);
        margin-bottom: 1.2rem;
        display: block;
        animation: floatEmpty 3s ease-in-out infinite;
      }

      @keyframes floatEmpty {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .empty-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        letter-spacing: 0.12em;
        color: var(--text-dim);
        opacity: 0.5;
        margin-bottom: 0.4rem;
      }

      .empty-sub {
        font-size: 0.7rem;
        color: var(--text-dim);
        opacity: 0.3;
        letter-spacing: 0.15em;
        font-style: italic;
      }

      /* ─── Footer ───────────────────────────────────────────── */
      .footer {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .foot-stat {
        font-size: 0.68rem;
        color: var(--text-dim);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .foot-stat span {
        color: var(--accent);
        font-weight: 500;
      }

      .clear-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-dim);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        padding: 0.35rem 0.85rem;
        cursor: pointer;
        transition: all 0.15s;
      }

      .clear-btn:hover {
        color: var(--danger);
        border-color: rgba(255, 85, 85, 0.35);
        background: var(--danger-dim);
      }

      /* ─── Scrollbar ────────────────────────────────────────── */
      ::-webkit-scrollbar {
        width: 3px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-mid);
        border-radius: 2px;
      }

      /* ─── Responsive ───────────────────────────────────────── */
      @media (max-width: 520px) {
        .app {
          padding: 1.5rem 1rem 2rem;
        }
        .main-title {
          font-size: clamp(4rem, 16vw, 6rem);
        }
        .header-meta {
          gap: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Boot overlay -->
    <div class="boot-overlay" id="boot">
      <div class="boot-text">TASK_OS v3.1.0 — 初始化中</div>
      <div class="boot-logo">ME<em>M</em>O</div>
      <div class="boot-bar-wrap"><div class="boot-bar"></div></div>
    </div>

    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="header-bar">
          <div class="sys-label">TASK_OS // 待办系统</div>
          <div class="sys-status">
            <div class="blink-dot"></div>
            <span class="sys-label">ONLINE</span>
          </div>
        </div>

        <div class="main-title">ME<span class="accent-char">M</span>O</div>

        <div class="header-meta">
          <div class="meta-chip" id="date-chip"></div>
          <div class="meta-chip">活跃 <b id="active-n">0</b></div>
          <div class="meta-chip">完成 <b id="done-n">0</b></div>
        </div>
      </header>

      <!-- Input -->
      <label class="input-label" for="todo-input">// 新建任务</label>
      <div class="input-row">
        <span class="input-prompt">›</span>
        <input
          type="text"
          class="todo-input"
          id="todo-input"
          placeholder="描述你的任务…"
          autocomplete="off"
          spellcheck="false"
          maxlength="200"
        />
        <button class="add-btn" id="add-btn" title="添加 (Enter)">ADD</button>
      </div>

      <!-- Filters -->
      <div class="filters">
        <button class="f-btn active" data-f="all">ALL</button>
        <button class="f-btn" data-f="active">ACTIVE</button>
        <button class="f-btn" data-f="done">DONE</button>
      </div>

      <!-- Tasks -->
      <ul class="task-list" id="task-list"></ul>

      <!-- Footer -->
      <footer class="footer">
        <div class="foot-stat">共 <span id="total-n">0</span> 个任务</div>
        <button class="clear-btn" id="clear-btn">清除已完成</button>
      </footer>
    </div>

    <script>
      (() => {
        /* ── State ── */
        let tasks = JSON.parse(localStorage.getItem("memo_tasks") || "[]");
        let filter = "all";
        let uid = tasks.length ? Math.max(...tasks.map((t) => t.id)) + 1 : 1;

        /* ── Date ── */
        const now = new Date();
        const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
        document.getElementById("date-chip").innerHTML =
          `<b>${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}</b> ${days[now.getDay()]}`;

        /* ── Persist ── */
        const save = () =>
          localStorage.setItem("memo_tasks", JSON.stringify(tasks));

        /* ── Stats ── */
        const updateStats = () => {
          const active = tasks.filter((t) => !t.done).length;
          const done = tasks.filter((t) => t.done).length;
          document.getElementById("active-n").textContent = active;
          document.getElementById("done-n").textContent = done;
          document.getElementById("total-n").textContent = tasks.length;
        };

        /* ── Sanitize ── */
        const esc = (s) =>
          s
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");

        /* ── Render ── */
        const render = () => {
          const list = document.getElementById("task-list");
          const view =
            filter === "all"
              ? tasks
              : filter === "active"
                ? tasks.filter((t) => !t.done)
                : tasks.filter((t) => t.done);

          if (!view.length) {
            const msgs = {
              all: ["[ ]", "NO TASKS", "// 队列为空，开始添加任务吧"],
              active: ["[✓]", "ALL DONE", "// 全部任务已完成"],
              done: ["[ ]", "NONE YET", "// 暂无已完成的任务"],
            };
            const [icon, title, sub] = msgs[filter];
            list.innerHTML = `
            <li style="list-style:none">
              <div class="empty">
                <span class="empty-icon">${icon}</span>
                <div class="empty-title">${title}</div>
                <div class="empty-sub">${sub}</div>
              </div>
            </li>`;
            updateStats();
            return;
          }

          list.innerHTML = view
            .map(
              (t, i) => `
          <li class="task-item ${t.done ? "done" : ""}" data-id="${t.id}">
            <span class="task-num">${String(i + 1).padStart(2, "0")}</span>
            <div class="task-check" role="checkbox" aria-checked="${t.done}" tabindex="0"
                 onclick="toggle(${t.id})"
                 onkeydown="if(event.key==='Enter'||event.key===' ')toggle(${t.id})">
              <span class="check-mark">✓</span>
            </div>
            <span class="task-text">${esc(t.text)}</span>
            <button class="task-del" onclick="remove(${t.id})" title="删除">×</button>
          </li>`,
            )
            .join("");

          updateStats();
        };

        /* ── Actions ── */
        window.toggle = (id) => {
          const t = tasks.find((t) => t.id === id);
          if (!t) return;
          t.done = !t.done;
          save();
          render();
        };

        window.remove = (id) => {
          const el = document.querySelector(`[data-id="${id}"]`);
          if (!el) return;
          el.classList.add("removing");
          el.addEventListener(
            "animationend",
            () => {
              tasks = tasks.filter((t) => t.id !== id);
              save();
              render();
            },
            { once: true },
          );
        };

        const addTask = (text) => {
          text = text.trim();
          if (!text) return false;
          tasks.unshift({ id: uid++, text, done: false, ts: Date.now() });
          save();
          render();
          return true;
        };

        /* ── Inputs ── */
        const input = document.getElementById("todo-input");
        const addBtn = document.getElementById("add-btn");

        addBtn.addEventListener("click", () => {
          if (addTask(input.value)) input.value = "";
          input.focus();
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            if (addTask(input.value)) input.value = "";
          }
        });

        /* ── Filters ── */
        document.querySelectorAll(".f-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll(".f-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            filter = btn.dataset.f;
            render();
          });
        });

        /* ── Clear done ── */
        document.getElementById("clear-btn").addEventListener("click", () => {
          tasks = tasks.filter((t) => !t.done);
          save();
          render();
        });

        /* ── Boot cleanup ── */
        const boot = document.getElementById("boot");
        boot.addEventListener("animationend", () => boot.remove(), {
          once: true,
        });

        /* ── Init ── */
        render();
      })();
    </script>
  </body>
</html>
